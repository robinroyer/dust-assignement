# fly.toml app configuration file generated for dust-assignement on 2026-04-19T23:56:52+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'dust-assignement'
primary_region = 'cdg'

[build]
dockerfile = "build/Dockerfile.mcp"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
